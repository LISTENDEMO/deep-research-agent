services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - travel-data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8102:80"
    restart: unless-stopped

volumes:
  travel-data:
